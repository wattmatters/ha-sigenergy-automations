alias: "SIGEN - CONTROL SUPPLEMENTAL GRID CHARGING"
description: >-
  Manages battery charging during a configurable free/cheap-rate period.
  Runs every minute — if supplemental charging is required, switches to
  Command Charging mode at a configurable rate; otherwise returns to
  Maximum Self-consumption with Remote EMS off. Shared as an example —
  adapt time windows and entity IDs to your own system.

# ─────────────────────────────────────────────────────────────────
# CONFIGURATION — edit these to match your system
# ─────────────────────────────────────────────────────────────────
#
# ← REPLACE all entity IDs and device_id values with your own.
# Use Developer Tools → States to find the correct entity IDs.
#
# Key values to adjust:
#   - Cheap/free rate window (after/before times in conditions)
#   - Monitoring window (condition at the bottom of the file)
#   - Minimum charge rate during cheap period (currently 2.0 kW)
#
# Battery capacity sensors — these may be disabled by default in your
# integration and need to be enabled in Developer Tools → Entities:
#   sensor.sigen_0_inverter_1_rated_battery_capacity  (kWh)
#   sensor.sigen_0_inverter_1_rated_charging_power    (kW)
#   sensor.sigen_0_inverter_1_rated_discharging_power (kW)
#
# ─────────────────────────────────────────────────────────────────

mode: single

trigger:
  - platform: time_pattern
    minutes: "/1"

condition:
  - condition: time
    after: "10:00:00"   # ← ADJUST: start monitoring from this time
    before: "17:30:00"  # ← ADJUST: stop monitoring after this time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
      - sat
      - sun

action:
  - choose:

      # ── CHEAP PERIOD: supplemental charging required ─────────────
      - conditions:
          - condition: time
            after: "10:59:50"
            before: "14:00:00"   # ← ADJUST to your cheap/free rate window
          - condition: state
            entity_id: input_boolean.battery_supplemental_charging_required
            state: "on"
          - condition: state
            entity_id: input_boolean.aemo_critical_override_active
            state: "off"
        sequence:
          # Enable Remote EMS if not already on
          - choose:
              - conditions:
                  - condition: state
                    entity_id: switch.sigen_0_plant_remote_ems  # ← REPLACE
                    state: "off"
                sequence:
                  # ← REPLACE device_id and entity_id with your Remote EMS switch
                  - type: turn_on
                    device_id: YOUR_SIGEN_DEVICE_ID
                    entity_id: YOUR_SIGEN_REMOTE_EMS_SWITCH_ENTITY_ID
                    domain: switch
                  - wait_template: "{{ states('select.sigen_0_plant_remote_ems_control_mode') != 'unavailable' }}"  # ← REPLACE
                    timeout: "00:00:30"
                    continue_on_timeout: false

          # ← REPLACE device_id, entity_id and option with your SIGEN select entity
          - device_id: YOUR_SIGEN_DEVICE_ID
            domain: select
            entity_id: YOUR_SIGEN_OPERATING_MODE_SELECT_ENTITY_ID
            type: select_option
            option: "Command Charging (Consume power from the PV first)"

          - delay:
              seconds: 5  # Allow inverter to settle into command charging mode

          - action: number.set_value
            data:
              value: >-
                {% set max_rate = states('sensor.sigen_0_inverter_1_rated_charging_power') | float(16.5) %}  {# ← REPLACE sensor if yours differs #}
                {% set rate = states('input_number.battery_charge_suggested_rate') | float(0) %}
                {% if rate <= 0 %}
                  2.0
                {% else %}
                  {{ [max_rate, (rate / 0.5) | round(0, 'ceil') * 0.5] | min }}
                {% endif %}
            target:
              entity_id: number.sigen_0_plant_max_charging_limit  # ← REPLACE

      # ── CHEAP PERIOD: supplemental charging NOT required ─────────
      - conditions:
          - condition: time
            after: "10:59:50"
            before: "14:00:00"   # ← ADJUST to your cheap/free rate window
          - condition: state
            entity_id: input_boolean.battery_supplemental_charging_required
            state: "off"
          - condition: state
            entity_id: input_boolean.aemo_critical_override_active
            state: "off"
        sequence:
          # Enable Remote EMS if not already on
          - choose:
              - conditions:
                  - condition: state
                    entity_id: switch.sigen_0_plant_remote_ems  # ← REPLACE
                    state: "off"
                sequence:
                  # ← REPLACE device_id and entity_id with your Remote EMS switch
                  - type: turn_on
                    device_id: YOUR_SIGEN_DEVICE_ID
                    entity_id: YOUR_SIGEN_REMOTE_EMS_SWITCH_ENTITY_ID
                    domain: switch
                  - wait_template: "{{ states('select.sigen_0_plant_remote_ems_control_mode') != 'unavailable' }}"  # ← REPLACE
                    timeout: "00:00:30"
                    continue_on_timeout: false

          - action: number.set_value
            data:
              value: "{{ states('sensor.sigen_0_inverter_1_rated_charging_power') | float(16.5) }}"  # ← REPLACE sensor if yours differs
            target:
              entity_id: number.sigen_0_plant_max_charging_limit  # ← REPLACE

          # ← REPLACE device_id, entity_id and option with your SIGEN select entity
          - device_id: YOUR_SIGEN_DEVICE_ID
            domain: select
            entity_id: YOUR_SIGEN_OPERATING_MODE_SELECT_ENTITY_ID
            type: select_option
            option: "Maximum Self-consumption (Default)"

          # ← REPLACE device_id and entity_id with your Remote EMS switch
          - type: turn_off
            device_id: YOUR_SIGEN_DEVICE_ID
            entity_id: YOUR_SIGEN_REMOTE_EMS_SWITCH_ENTITY_ID
            domain: switch

      # ── CLEANUP: outside cheap period, Remote EMS still on ───────
      # Does not act if AEMO override is active or if in Command Discharging
      # (which is owned by the grid bias offset automation)
      - conditions:
          - condition: not
            conditions:
              - condition: time
                after: "11:00:00"
                before: "14:00:00"   # ← ADJUST to your cheap/free rate window
          - condition: not
            conditions:
              - condition: state
                entity_id: switch.sigen_0_plant_remote_ems  # ← REPLACE
                state: "off"
          - condition: state
            entity_id: input_boolean.aemo_critical_override_active
            state: "off"
          - condition: not
            conditions:
              - condition: state
                entity_id: select.sigen_0_plant_remote_ems_control_mode  # ← REPLACE
                state: "Command Discharging (Output power from PV first)"
        sequence:
          - action: number.set_value
            data:
              value: "{{ states('sensor.sigen_0_inverter_1_rated_charging_power') | float(16.5) }}"  # ← REPLACE sensor if yours differs
            target:
              entity_id: number.sigen_0_plant_max_charging_limit  # ← REPLACE

          # ← REPLACE device_id, entity_id and option with your SIGEN select entity
          - device_id: YOUR_SIGEN_DEVICE_ID
            domain: select
            entity_id: YOUR_SIGEN_OPERATING_MODE_SELECT_ENTITY_ID
            type: select_option
            option: "Maximum Self-consumption (Default)"

          # ← REPLACE device_id and entity_id with your Remote EMS switch
          - type: turn_off
            device_id: YOUR_SIGEN_DEVICE_ID
            entity_id: YOUR_SIGEN_REMOTE_EMS_SWITCH_ENTITY_ID
            domain: switch
